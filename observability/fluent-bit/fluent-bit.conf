[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker_json
    Tag               docker.*
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On

# Docker хранит stdout контейнера в поле log. Наши сервисы пишут туда JSON,
# поэтому вторым шагом разворачиваем прикладные поля: service, event, log_type.
[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        app_json
    Reserve_Data  On
    Preserve_Key  Off

[FILTER]
    Name   modify
    Match  docker.*
    Add    environment local
    Add    project springcat

[OUTPUT]
    Name        loki
    Match       docker.*
    Host        loki
    Port        3100
    Labels      project=springcat, environment=$environment, service=$service, log_type=$log_type
    Auto_Kubernetes_Labels Off
    Line_Format json
