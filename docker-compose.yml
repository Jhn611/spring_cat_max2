services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: springcat
      POSTGRES_USER: springcat
      POSTGRES_PASSWORD: springcat
    ports:
      - "5432:5432"
    volumes:
      - springcat-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springcat -d springcat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  data-service:
    image: springcat-app:latest
    build:
      context: .
    command: ["node", "dist/data-service/index.js"]
    environment:
      DATA_SERVICE_PORT: "3060"
      DATABASE_URL: postgres://springcat:springcat@postgres:5432/springcat
    ports:
      - "3060:3060"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3060/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  bot:
    image: springcat-app:latest
    command: ["node", "dist/bot/index.js"]
    env_file:
      - path: .env
        required: false
    environment:
      DATA_SERVICE_URL: http://data-service:3060
    depends_on:
      data-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  springcat-postgres:
